services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - CESAR_MODEL_PATH=/artifacts/model_latest.joblib
      - CESAR_CONTRACT_PATH=/artifacts/contract_latest.json
    volumes:
      - ../artifact_storage:/artifacts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.ui
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
