# ---
# Deployment = "run this image in N copies (pods)". Kubernetes keeps N running;
# if one crashes, it starts another. We use 2 replicas so traffic is spread and
# one pod can be down briefly without dropping all requests.
# ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cesar-api
  labels:
    app: cesar-api
    version: stable   # Used by the Service selector; canary has version=canary
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cesar-api
      version: stable
  template:
    metadata:
      labels:
        app: cesar-api
        version: stable
    spec:
      containers:
        - name: api
          image: cesar-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: CESAR_MODEL_PATH
              value: "/artifacts/model_latest.joblib"
            - name: CESAR_CONTRACT_PATH
              value: "/artifacts/contract_latest.json"
          readinessProbe: #uncommented skeleton for readiness probe
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe: #added a liveness probe to restart the container if it becomes unresponsive
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
